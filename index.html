<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành Trình Xưng Bá Của Ta</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Noto Serif SC', serif;
 background:#e8f5e9;
 color:#1b3a2f;
 overflow-x:hidden;
}

/* ===== BANNER ===== */
header{
 height:40vh;
 position:relative;
 overflow:hidden;
}
.banner{
 position:absolute;
 width:100%;height:100%;
 background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover;
 filter:brightness(0.7);
}
header h1{
 position:relative;
 text-align:center;
 top:40%;
 color:white;
 font-size:40px;
 text-shadow:0 0 20px rgba(0,0,0,0.7);
}

/* NAV */
nav{
 display:flex;
 justify-content:center;
 gap:40px;
 padding:15px;
 background:rgba(255,255,255,0.8);
 backdrop-filter:blur(10px);
 position:sticky;
 top:0;
}
nav a{cursor:pointer}

/* PAGE */
.page{display:none;padding:40px}
.page.active{display:block}

/* TEXT ANIMATION */
.line{
 opacity:0;
 transform:translateY(20px);
 animation:fadeUp 1s forwards;
}
@keyframes fadeUp{
 to{opacity:1;transform:translateY(0)}
}

/* BOX */
.box{
 background:rgba(255,255,255,0.8);
 padding:25px;
 border-radius:15px;
 margin-bottom:20px;
 text-align:center;
 line-height:1.8;
}

/* MEMBERS */
.members{
 display:flex;
 gap:30px;
 justify-content:center;
 flex-wrap:wrap;
}

.card{
 width:220px;
 background:white;
 border-radius:15px;
 overflow:hidden;
 text-align:center;
 cursor:pointer;
 transition:0.3s;
}
.card:hover{
 transform:scale(1.05);
 box-shadow:0 0 20px #81c784;
}
.card img{
 width:100%;
}

/* DETAIL */
#detail{
 min-height:100vh;
 background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
 color:white;
 padding:60px;
 text-shadow:0 0 10px rgba(0,0,0,0.7);
}

.profile{
 background:rgba(0,0,0,0.5);
 padding:30px;
 border-radius:15px;
 max-width:500px;
 margin:auto;
 text-align:center;
}

.profile img{
 width:200px;
 border-radius:10px;
 margin-bottom:20px;
}

.quote{
 font-style:italic;
 margin-top:20px;
 color:#c8e6c9;
}
</style>
</head>

<body>

<header>
 <div class="banner"></div>
 <h1>Hành Trình Xưng Bá Của Ta</h1>
</header>

<nav>
 <a onclick="goPage('home')">Trang chủ</a>
 <a onclick="goPage('origin')">Sơ nguyên</a>
 <a onclick="goPage('members')">Thành viên</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">
 <div class="box" id="homeText"></div>
</div>

<!-- ORIGIN -->
<div id="origin" class="page">
 <div class="box">
  <p style="font-size:20px;">
  "Mười năm trước may mắn đã gặp các vị<br>
  Mười năm sau may mắn được gặp các vị<br>
  Đều là vinh hạnh của ta!"
  </p>
 </div>
</div>

<!-- MEMBERS -->
<div id="members" class="page">
 <div class="members" id="memberList"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="page"></div>

<script>

/* ===== TEXT HOME ===== */
const text = [
"Hồng trần muôn sắc",
"Mây nước đường xa",
"Nay đứng dưới trời cao đất rộng",
"Chỉ mong không thẹn với minh nguyệt trong lòng",
"Ta, từng là một thiếu niên"
]

let box=document.getElementById("homeText")
text.forEach((t,i)=>{
 let p=document.createElement("p")
 p.className="line"
 p.style.animationDelay=i+"s"
 p.innerText=t
 box.appendChild(p)
})

/* ===== DATA ===== */
const members=[
{
 id:1,
 name:"Sở Dĩ",
 img:"images/nv1.jpg",
 wish:"Làm giang hồ, xưng bá thiên hạ",
 quote:"Đã đến nhân gian rồi thì cứ sống khoái hoạt một lần đi!"
},
{
 id:2,
 name:"Tạ Thừa Cảnh",
 img:"images/nv2.jpg",
 wish:"Ta cũng không rõ nữa, muốn làm cái cây có tính không?",
 quote:"Chuyện ngươi muốn làm thì ta đều ủng hộ hết"
}
]

/* ===== RENDER ===== */
let list=document.getElementById("memberList")
members.forEach(m=>{
 let d=document.createElement('div')
 d.className='card'
 d.innerHTML=`<img src="${m.img}"><h3>${m.name}</h3>`
 d.onclick=()=>openDetail(m.id)
 list.appendChild(d)
})

/* NAV */
function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.getElementById(id).classList.add('active')
}

function goPage(p){
 history.pushState({page:p},"","#"+p)
 show(p)
}

/* DETAIL */
function openDetail(id){
 let m=members.find(x=>x.id==id)

 document.getElementById("detail").innerHTML=`
 <div class="profile">
  <img src="${m.img}">
  <h2>${m.name}</h2>
  <p><b>Ước vọng:</b> ${m.wish}</p>
  <div class="quote">"${m.quote}"</div>
 </div>
 `

 history.pushState({page:"member-"+id},"","#member-"+id)
 show("detail")
}

/* BACK */
window.onpopstate=e=>{
 if(e.state){
  if(e.state.page.startsWith("member-")){
   openDetail(e.state.page.split("-")[1])
  }else show(e.state.page)
 }else show("home")
}

</script>

</body>
</html>
