<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành Trình Xưng Bá Của Ta</title>

<!-- FONT KHÔNG LỖI TIẾNG VIỆT -->
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Be Vietnam Pro', sans-serif;
 background:#f4fff8;
 color:#1b3a2f;
 overflow-x:hidden;
}

/* ===== PAGE ===== */
.page{
 display:none;
 padding:30px;
 opacity:0;
 transform:translateY(20px);
 transition:0.5s;
}
.page.active{
 display:block;
 opacity:1;
 transform:translateY(0);
}

/* ===== BANNER ===== */
header{
 height:180px;
 position:relative;
 background:url('images/banner.jpg') center/cover;
 display:flex;
 align-items:center;
 justify-content:center;
}

header::after{
 content:"";
 position:absolute;
 inset:0;
 background:rgba(0,0,0,0.4); /* lớp tối */
}

header h1{
 position:relative;
 color:#fff;
 font-family:'Ma Shan Zheng';
 font-size:34px;
 z-index:1;
}

/* ===== NAV ===== */
nav{
 display:flex;
 justify-content:center;
 gap:30px;
 background:#e6fff2;
 padding:12px;
}
nav a{
 cursor:pointer;
 font-weight:500;
}

/* ===== HOME ===== */
.home-box{
 max-width:700px;
 margin:auto;
 background:white;
 padding:30px;
 border-radius:12px;
 box-shadow:0 10px 30px rgba(0,0,0,0.1);
 text-align:center;
}

.line{
 opacity:0;
 transform:translateY(20px);
 animation:fadeUp 1s forwards;
 font-family:'Ma Shan Zheng';
 font-size:22px;
}
@keyframes fadeUp{
 to{opacity:1;transform:translateY(0)}
}

/* ===== SƠ NGUYÊN ===== */
#origin{
 position:relative;
 min-height:80vh;
 display:flex;
 align-items:center;
 justify-content:center;
}

#origin::before{
 content:"";
 position:absolute;
 inset:0;
 background:url('images/songuyen.jpg') center/cover;
 filter:blur(6px) brightness(0.6); /* mờ + tối */
}

.origin-box{
 position:relative;
 color:white;
 background:rgba(0,0,0,0.4);
 padding:30px;
 border-radius:10px;
 font-family:'Ma Shan Zheng';
 font-size:22px;
 text-align:center;
}

/* ===== MEMBERS ===== */
.members{
 display:flex;
 justify-content:center;
 gap:30px;
 flex-wrap:wrap;
 margin-top:40px; /* FIX lỗi trôi */
}

.card{
 width:220px;
 position:relative;
 cursor:pointer;
 transition:0.4s;
}

.card img{
 width:100%;
 border-radius:10px;
}

/* glow */
.card:hover{
 transform:translateY(-10px) scale(1.05);
 box-shadow:0 0 25px rgba(0,255,150,0.6);
}

/* hover info */
.info{
 position:absolute;
 inset:0;
 background:rgba(0,0,0,0.65);
 color:white;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 opacity:0;
 transition:0.3s;
 padding:10px;
 border-radius:10px;
 text-align:center;
}
.card:hover .info{
 opacity:1;
}

/* ===== DETAIL ===== */
#detail{
 min-height:100vh;
 position:relative;
 display:flex;
 align-items:center;
 justify-content:center;
}

#detail::before{
 content:"";
 position:absolute;
 inset:0;
 background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
 filter:blur(4px) brightness(0.7);
}

.detail-box{
 position:relative;
 background:rgba(255,255,255,0.9);
 padding:30px;
 border-radius:12px;
 text-align:center;
 max-width:400px;
}

/* ===== PARTICLE ===== */
canvas{
 position:fixed;
 top:0;
 left:0;
 pointer-events:none;
}
</style>
</head>

<body>

<canvas id="particle"></canvas>

<header>
 <h1>Hành Trình Xưng Bá Của Ta</h1>
</header>

<nav>
 <a onclick="goPage('home')">Trang chủ</a>
 <a onclick="goPage('origin')">Sơ nguyên</a>
 <a onclick="goPage('members')">Thành viên</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">
 <div class="home-box" id="homeText"></div>
</div>

<!-- ORIGIN -->
<div id="origin" class="page">
 <div class="origin-box">
 Mười năm trước may mắn đã gặp các vị<br>
 Mười năm sau may mắn được gặp các vị<br>
 Đều là vinh hạnh của ta!
 </div>
</div>

<!-- MEMBERS -->
<div id="members" class="page">
 <div class="members">

  <div class="card" onclick="openDetail(1)">
   <img src="images/nv1.jpg">
   <div class="info">
    <b>Sở Dĩ</b>
    <p>Làm giang hồ, xưng bá thiên hạ</p>
    <i>"Sống khoái hoạt!"</i>
   </div>
  </div>

  <div class="card" onclick="openDetail(2)">
   <img src="images/nv2.jpg">
   <div class="info">
    <b>Tạ Thừa Cảnh</b>
    <p>Muốn làm một cái cây</p>
    <i>"Ta ủng hộ ngươi"</i>
   </div>
  </div>

 </div>
</div>

<!-- DETAIL -->
<div id="detail" class="page"></div>

<script>

/* TEXT HOME */
const text=[
"Hồng trần muôn sắc",
"Mây nước đường xa",
"Nay đứng dưới trời cao đất rộng",
"Chỉ mong không thẹn với minh nguyệt trong lòng",
"Ta, từng là một thiếu niên"
]

let box=document.getElementById("homeText")
text.forEach((t,i)=>{
 let p=document.createElement("p")
 p.className="line"
 p.style.animationDelay=i+"s"
 p.innerText=t
 box.appendChild(p)
})

/* NAV */
function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.getElementById(id).classList.add('active')
}
function goPage(page){
 history.pushState({page:page},"","#"+page)
 show(page)
}

/* DETAIL */
function openDetail(id){
 let data={
 1:{
  name:"Sở Dĩ",
  wish:"Làm giang hồ, xưng bá thiên hạ",
  quote:"Đã đến nhân gian rồi thì cứ sống khoái hoạt một lần đi!",
  img:"images/nv1.jpg"
 },
 2:{
  name:"Tạ Thừa Cảnh",
  wish:"Muốn làm một cái cây",
  quote:"Chuyện ngươi muốn làm thì ta đều ủng hộ hết",
  img:"images/nv2.jpg"
 }
 }

 let m=data[id]

 document.getElementById("detail").innerHTML=`
 <div class="detail-box">
  <h2>${m.name}</h2>
  <img src="${m.img}" width="200">
  <p><b>Ước vọng:</b> ${m.wish}</p>
  <p><i>"${m.quote}"</i></p>
 </div>
 `

 history.pushState({page:"member-"+id},"","#member-"+id)
 show("detail")
}

/* BACK */
window.onpopstate=function(e){
 if(e.state){
   if(e.state.page.startsWith("member-")){
     openDetail(e.state.page.split("-")[1])
   }else{
     show(e.state.page)
   }
 }else show("home")
}

/* PARTICLE TIÊN KHÍ */
let c=document.getElementById("particle")
let ctx=c.getContext("2d")

function resize(){
 c.width=window.innerWidth
 c.height=window.innerHeight
}
resize()

let p=[]
for(let i=0;i<60;i++){
 p.push({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  r:Math.random()*2,
  v:Math.random()*0.5+0.2
 })
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height)
 ctx.fillStyle="rgba(100,255,150,0.6)"
 p.forEach(i=>{
  ctx.beginPath()
  ctx.arc(i.x,i.y,i.r,0,Math.PI*2)
  ctx.fill()
  i.y-=i.v
  if(i.y<0)i.y=c.height
 })
 requestAnimationFrame(draw)
}
draw()

</script>

</body>
</html>
