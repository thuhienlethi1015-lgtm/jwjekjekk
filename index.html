<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành Trình Xưng Bá Của Ta</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Noto Serif SC', serif;
 background:#000;
 color:white;
 overflow:hidden;
}

/* ===== INTRO ===== */
#intro{
 position:fixed;
 inset:0;
 background:black;
 display:flex;
 align-items:center;
 justify-content:center;
 flex-direction:column;
 z-index:9999;
 animation:fadeOut 3s 4s forwards;
}
#intro h1{
 font-size:40px;
 opacity:0;
 animation:fadeIn 3s forwards;
}
@keyframes fadeIn{
 to{opacity:1}
}
@keyframes fadeOut{
 to{opacity:0;visibility:hidden}
}

/* ===== MAIN ===== */
#main{display:none}

/* BANNER */
header{
 height:40vh;
 position:relative;
 overflow:hidden;
}
.banner{
 position:absolute;
 width:100%;height:100%;
 background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover;
 filter:brightness(0.6);
}
header h1{
 position:relative;
 text-align:center;
 top:40%;
}

/* NAV */
nav{
 display:flex;
 justify-content:center;
 gap:30px;
 background:#111;
 padding:10px;
}
nav a{cursor:pointer}

/* PAGE */
.page{display:none;padding:30px}
.page.active{display:block}

/* HOME TEXT */
.line{
 opacity:0;
 animation:fadeUp 1s forwards;
}
@keyframes fadeUp{
 to{opacity:1;transform:translateY(0)}
}

/* MEMBERS */
.members{
 display:flex;
 justify-content:center;
 gap:20px;
}
.card{
 width:200px;
 cursor:pointer;
}
.card img{
 width:100%;
}

/* DETAIL */
#detail{
 background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
 min-height:100vh;
}

/* EFFECT */
.flash{
 position:fixed;
 inset:0;
 background:white;
 opacity:0;
 pointer-events:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
 <h1>Hành Trình Xưng Bá Của Ta</h1>
</div>

<!-- SOUND -->
<audio id="bgm" loop>
 <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<!-- MAIN -->
<div id="main">

<header>
 <div class="banner"></div>
 <h1>Hành Trình Xưng Bá Của Ta</h1>
</header>

<nav>
 <a onclick="goPage('home')">Trang chủ</a>
 <a onclick="goPage('origin')">Sơ nguyên</a>
 <a onclick="goPage('members')">Thành viên</a>
 <a onclick="toggleMusic()">🎵</a>
</nav>

<div id="home" class="page active">
 <div id="homeText"></div>
</div>

<div id="origin" class="page">
 <p>"Mười năm trước may mắn đã gặp các vị..."</p>
</div>

<div id="members" class="page">
 <div class="members" id="memberList"></div>
</div>

<div id="detail" class="page"></div>

</div>

<div class="flash" id="flash"></div>

<canvas id="fog"></canvas>

<script>

/* ===== INTRO LOAD ===== */
setTimeout(()=>{
 document.getElementById("main").style.display="block"
 document.body.style.overflow="auto"
},4000)

/* ===== TEXT ===== */
const text=[
"Hồng trần muôn sắc",
"Mây nước đường xa",
"Nay đứng dưới trời cao đất rộng",
"Chỉ mong không thẹn với minh nguyệt trong lòng",
"Ta, từng là một thiếu niên"
]

let box=document.getElementById("homeText")
text.forEach((t,i)=>{
 let p=document.createElement("p")
 p.className="line"
 p.style.animationDelay=i+"s"
 p.innerText=t
 box.appendChild(p)
})

/* ===== DATA ===== */
const members=[
{id:1,name:"Sở Dĩ",img:"images/nv1.jpg"},
{id:2,name:"Tạ Thừa Cảnh",img:"images/nv2.jpg"}
]

let list=document.getElementById("memberList")
members.forEach(m=>{
 let d=document.createElement('div')
 d.className='card'
 d.innerHTML=`<img src="${m.img}"><h3>${m.name}</h3>`
 d.onclick=()=>openDetail(m.id)
 list.appendChild(d)
})

/* NAV */
function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.getElementById(id).classList.add('active')
}
function goPage(p){
 history.pushState({page:p},"","#"+p)
 show(p)
}

/* EFFECT CLICK */
function flash(){
 let f=document.getElementById("flash")
 f.style.opacity=1
 setTimeout(()=>f.style.opacity=0,200)
}

/* DETAIL */
function openDetail(id){
 flash()
 let m=members.find(x=>x.id==id)
 document.getElementById("detail").innerHTML=`
 <h1>${m.name}</h1>
 <img src="${m.img}" width="200">
 `
 show("detail")
}

/* MUSIC */
function toggleMusic(){
 let a=document.getElementById("bgm")
 if(a.paused) a.play()
 else a.pause()
}

/* FOG */
let c=document.getElementById("fog")
let ctx=c.getContext("2d")
function resize(){
 c.width=window.innerWidth
 c.height=window.innerHeight
}
resize()

let fog=[]
for(let i=0;i<20;i++){
 fog.push({x:Math.random()*c.width,y:Math.random()*c.height})
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height)
 ctx.fillStyle="rgba(255,255,255,0.05)"
 fog.forEach(f=>{
  ctx.beginPath()
  ctx.arc(f.x,f.y,100,0,Math.PI*2)
  ctx.fill()
  f.x+=0.2
 })
 requestAnimationFrame(draw)
}
draw()

</script>

</body>
</html>
