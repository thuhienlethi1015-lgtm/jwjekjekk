<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành Trình Xưng Bá Của Ta</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Noto Serif SC', serif;
 background:black;
 color:white;
 overflow:hidden;
}

/* INTRO */
#intro{
 position:fixed;
 inset:0;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:30px;
 z-index:9999;
 animation:fadeOut 3s 3s forwards;
}
@keyframes fadeOut{
 to{opacity:0;visibility:hidden}
}

/* MAIN */
#main{display:none}

/* NAV */
nav{
 display:flex;
 justify-content:center;
 gap:20px;
 background:#111;
 padding:10px;
}
nav a{cursor:pointer}

/* PAGE */
.page{display:none;padding:20px}
.page.active{display:block}

/* HOME TEXT */
.line{
 opacity:0;
 animation:fadeUp 1s forwards;
}
@keyframes fadeUp{
 to{opacity:1;transform:translateY(0)}
}

/* MEMBERS */
.members{
 display:flex;
 justify-content:center;
 gap:30px;
}
.card{
 width:200px;
 cursor:pointer;
 text-align:center;
}
.card img{
 width:100%;
 animation:float 3s infinite;
}
@keyframes float{
 50%{transform:translateY(-10px)}
}

/* DETAIL */
#detail{
 min-height:100vh;
 background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
 text-align:center;
 padding-top:50px;
}

/* HUD */
.hud{
 position:fixed;
 top:10px;
 left:10px;
 z-index:999;
}
.bar{
 width:200px;
 height:10px;
 background:#333;
 margin-bottom:5px;
}
.hp{background:red;height:100%}
.mp{background:cyan;height:100%}

/* KIEM KHI */
.sword{
 position:fixed;
 width:6px;
 height:40px;
 background:linear-gradient(white,cyan);
 pointer-events:none;
 transform:rotate(45deg);
 opacity:0.7;
}

/* PARTICLE */
canvas{
 position:fixed;
 top:0;
 left:0;
}
</style>
</head>

<body>

<div id="intro">Hành Trình Xưng Bá Của Ta</div>

<audio id="bgm" loop>
 <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="hud">
 HP<div class="bar"><div class="hp" style="width:80%"></div></div>
 Nội lực<div class="bar"><div class="mp" style="width:60%"></div></div>
</div>

<div id="main">

<nav>
 <a onclick="goPage('home')">Trang chủ</a>
 <a onclick="goPage('origin')">Sơ nguyên</a>
 <a onclick="goPage('members')">Thành viên</a>
 <a onclick="toggleMusic()">🎵</a>
</nav>

<div id="home" class="page active">
 <div id="homeText"></div>
</div>

<div id="origin" class="page">
 <p>"Mười năm trước may mắn đã gặp các vị..."</p>
</div>

<div id="members" class="page">
 <div class="members" id="memberList"></div>
</div>

<div id="detail" class="page"></div>

</div>

<canvas id="particle"></canvas>

<script>

/* INTRO */
setTimeout(()=>{
 document.getElementById("main").style.display="block"
 document.body.style.overflow="auto"
},3000)

/* TEXT */
const text=[
"Hồng trần muôn sắc",
"Mây nước đường xa",
"Nay đứng dưới trời cao đất rộng",
"Chỉ mong không thẹn với minh nguyệt trong lòng",
"Ta, từng là một thiếu niên"
]

let box=document.getElementById("homeText")
text.forEach((t,i)=>{
 let p=document.createElement("p")
 p.className="line"
 p.style.animationDelay=i+"s"
 p.innerText=t
 box.appendChild(p)
})

/* DATA */
const members=[
{id:1,name:"Sở Dĩ",img:"images/nv1.jpg"},
{id:2,name:"Tạ Thừa Cảnh",img:"images/nv2.jpg"}
]

let list=document.getElementById("memberList")
members.forEach(m=>{
 let d=document.createElement('div')
 d.className='card'
 d.innerHTML=`<img src="${m.img}"><h3>${m.name}</h3>`
 d.onclick=()=>openDetail(m.id)
 list.appendChild(d)
})

function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.getElementById(id).classList.add('active')
}
function goPage(p){
 show(p)
}

/* DETAIL */
function openDetail(id){
 let m=members.find(x=>x.id==id)
 document.getElementById("detail").innerHTML=`
 <h1>${m.name}</h1>
 <img src="${m.img}" width="200">
 `
 show("detail")
}

/* MUSIC */
function toggleMusic(){
 let a=document.getElementById("bgm")
 if(a.paused) a.play()
 else a.pause()
}

/* KIẾM KHÍ */
document.addEventListener("mousemove",e=>{
 let s=document.createElement("div")
 s.className="sword"
 s.style.left=e.clientX+"px"
 s.style.top=e.clientY+"px"
 document.body.appendChild(s)
 setTimeout(()=>s.remove(),300)
})

/* PARTICLE */
let c=document.getElementById("particle")
let ctx=c.getContext("2d")

function resize(){
 c.width=window.innerWidth
 c.height=window.innerHeight
}
resize()

let p=[]
for(let i=0;i<50;i++){
 p.push({x:Math.random()*c.width,y:Math.random()*c.height})
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height)
 ctx.fillStyle="white"
 p.forEach(i=>{
  ctx.fillRect(i.x,i.y,2,2)
  i.y+=0.5
  if(i.y>c.height)i.y=0
 })
 requestAnimationFrame(draw)
}
draw()

</script>

</body>
</html>
