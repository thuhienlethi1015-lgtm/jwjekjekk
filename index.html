<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liên Minh Công Lý</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Noto Serif SC', serif;
 background:#e8f5e9;
 color:#1b3a2f;
 overflow-x:hidden;
}

/* ===== BANNER ===== */
header{
 height:40vh;
 position:relative;
 overflow:hidden;
}
.banner-bg{
 position:absolute;
 width:100%;height:100%;
 background:url('https://images.unsplash.com/photo-1549880338-65ddcdfd017b') center/cover;
 filter:brightness(0.8);
}
.fog{
 position:absolute;
 width:200%;
 height:100%;
 background:radial-gradient(circle,rgba(255,255,255,0.3),transparent);
 animation:fogMove 25s linear infinite;
}
@keyframes fogMove{
 0%{transform:translateX(0)}
 100%{transform:translateX(-50%)}
}
header h1{
 position:relative;
 text-align:center;
 top:40%;
 color:white;
 font-size:40px;
 text-shadow:0 0 20px rgba(0,0,0,0.7);
}

/* NAV */
nav{
 display:flex;
 justify-content:center;
 gap:40px;
 padding:15px;
 background:rgba(255,255,255,0.8);
 backdrop-filter:blur(10px);
 position:sticky;
 top:0;
 z-index:1000;
}
nav a{cursor:pointer}

/* PAGE */
.page{display:none;padding:40px}
.page.active{display:block}

/* BOX */
.box{
 background:rgba(255,255,255,0.7);
 padding:20px;
 border-radius:15px;
 margin-bottom:20px;
 border:1px solid #a5d6a7;
}

/* TEXT EFFECT */
.story p{
 opacity:0;
 transform:translateY(20px);
 animation:fadeUp 1s forwards;
}
@keyframes fadeUp{
 to{opacity:1;transform:translateY(0)}
}

/* MEMBERS */
.members{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:20px;
}

/* CARD cổ trang */
.card{
 background:#fff;
 border-radius:15px;
 overflow:hidden;
 text-align:center;
 cursor:pointer;
 transition:0.3s;
 position:relative;
 border:2px solid #a5d6a7;
}
.card:hover{
 transform:scale(1.05);
 box-shadow:0 0 20px #81c784;
}
.card img{
 width:100%;
 animation:float 3s ease-in-out infinite;
}
@keyframes float{
 50%{transform:translateY(-10px)}
}

/* DETAIL */
#detail{
 background:linear-gradient(#e8f5e9,#c8e6c9);
 min-height:100vh;
}

/* LEAVES */
.leaf{
 position:fixed;
 top:-50px;
 width:20px;height:20px;
 background:url('https://cdn-icons-png.flaticon.com/512/2909/2909762.png') no-repeat center/contain;
 animation:fall linear infinite;
}
@keyframes fall{
 to{transform:translateY(110vh) rotate(360deg)}
}

</style>
</head>

<body>

<!-- LEAVES -->
<script>
for(let i=0;i<20;i++){
 let l=document.createElement('div')
 l.className='leaf'
 l.style.left=Math.random()*100+'vw'
 l.style.animationDuration=(5+Math.random()*10)+'s'
 document.body.appendChild(l)
}
</script>

<header>
 <div class="banner-bg"></div>
 <div class="fog"></div>
 <h1>Liên Minh Công Lý</h1>
</header>

<nav>
 <a onclick="goPage('home')">Trang chủ</a>
 <a onclick="goPage('origin')">Sơ nguyên</a>
 <a onclick="goPage('members')">Thành viên</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">
 <div class="box story" id="storyBox"></div>

 <div class="box">
  <h2>Cột mốc</h2>
  <p>Tháng 4 năm 2026 thành lập Liên Minh.</p>
 </div>
</div>

<!-- ORIGIN -->
<div id="origin" class="page">
 <div class="box">
  <h2>Hình thành</h2>
  <p>Xưng bá thiên hạ.</p>
 </div>
</div>

<!-- MEMBERS -->
<div id="members" class="page">
 <h2>Thành viên</h2>
 <div class="members" id="memberList"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="page"></div>

<script>

/* STORY */
const story=[
"Ngày xưa trời đất hỗn mang...",
"Sở Dĩ và Tạ Thừa Cảnh lập chí lớn...",
"Chiêu mộ anh hùng thiên hạ...",
"Liên Minh Công Lý ra đời..."
]

let box=document.getElementById("storyBox")
story.forEach((t,i)=>{
 let p=document.createElement("p")
 p.style.animationDelay=i+"s"
 p.innerText=t
 box.appendChild(p)
})

/* DATA */
const membersData=[
{id:1,name:"Sở Dĩ",img:"images/nv1.jpg"},
{id:2,name:"Tạ Thừa Cảnh",img:"images/nv2.jpg"},
{id:3,name:"Phí Quân An",img:"images/nv3.jpg"},
{id:4,name:"Hoàng Thế Hiển",img:"images/nv4.jpg"},
{id:5,name:"Quý Đề Khôi",img:"images/nv5.jpg"},
{id:6,name:"Nhân vật 6",img:"images/nv6.jpg"},
{id:7,name:"Nhân vật 7",img:"images/nv7.jpg"},
{id:8,name:"Nhân vật 8",img:"images/nv8.jpg"}
]

let list=document.getElementById("memberList")
membersData.forEach(m=>{
 let d=document.createElement('div')
 d.className='card'
 d.innerHTML=`<img src="${m.img}"><h3>${m.name}</h3>`
 d.onclick=()=>openDetail(m.id)
 list.appendChild(d)
})

function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
 document.getElementById(id).classList.add('active')
}

function goPage(p){
 history.pushState({page:p},"","#"+p)
 show(p)
}

function openDetail(id){
 let m=membersData.find(x=>x.id==id)
 document.getElementById("detail").innerHTML=`
  <h1>${m.name}</h1>
  <img src="${m.img}" width="250">
 `
 history.pushState({page:"member-"+id},"","#member-"+id)
 show("detail")
}

window.onpopstate=e=>{
 if(e.state){
  if(e.state.page.startsWith("member-")){
   openDetail(e.state.page.split("-")[1])
  }else show(e.state.page)
 }else show("home")
}

</script>

</body>
</html>
