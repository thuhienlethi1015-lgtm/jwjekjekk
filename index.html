<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành Trình Xưng Bá Của Ta</title>

<!-- PRELOAD FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;500;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Be Vietnam Pro', sans-serif;
 background:#f4fff8;
 color:#1b3a2f;
 overflow-x:hidden;
}

/* ===== PAGE TRANSITION MƯỢT ===== */
.page{
 display:none;
 padding:30px;
 opacity:0;
 transform:translateY(20px);
 transition:opacity 0.4s ease, transform 0.4s ease;
}
.page.active{
 display:block;
 opacity:1;
 transform:translateY(0);
}

/* ===== BANNER ===== */
header{
 height:180px;
 position:relative;
 background:url('images/banner.jpg') center/cover;
 display:flex;
 align-items:center;
 justify-content:center;
}

header::after{
 content:"";
 position:absolute;
 inset:0;
 background:rgba(0,0,0,0.5);
}

header h1{
 position:relative;
 color:#fff;
 font-family:'Playfair Display', serif;
 font-size:32px;
}

/* ===== NAV ===== */
nav{
 display:flex;
 justify-content:center;
 gap:30px;
 background:#e6fff2;
 padding:12px;
}

/* ===== HOME ===== */
.home-box{
 max-width:700px;
 margin:auto;
 background:white;
 padding:30px;
 border-radius:12px;
 box-shadow:0 10px 30px rgba(0,0,0,0.1);
 text-align:center;
}

.line{
 opacity:0;
 transform:translateY(20px);
 animation:fadeUp 1s forwards;
 font-size:20px;
}
@keyframes fadeUp{
 to{opacity:1;transform:translateY(0)}
}

/* ===== SƠ NGUYÊN ===== */
#origin{
 position:relative;
 min-height:80vh;
 display:flex;
 align-items:center;
 justify-content:center;
}

#origin::before{
 content:"";
 position:absolute;
 inset:0;
 background:url('images/songuyen.jpg') center/cover;
 filter:blur(5px) brightness(0.6);
}

.origin-box{
 position:relative;
 color:white;
 background:rgba(0,0,0,0.4);
 padding:30px;
 border-radius:10px;
 text-align:center;
 font-size:20px;
}

/* ===== MEMBERS ===== */
.members{
 display:flex;
 justify-content:center;
 gap:30px;
 flex-wrap:wrap;
 align-items:flex-start;
}

.card{
 width:220px;
 position:relative;
 cursor:pointer;
 transform:translateY(10px);
 transition:0.4s;
}

.card img{
 width:100%;
 border-radius:10px;
 opacity:0;
 transition:opacity 0.6s ease;
}

/* ảnh load xong */
.card img.loaded{
 opacity:1;
}

/* hover PC */
.card:hover{
 transform:translateY(-10px) scale(1.05);
 box-shadow:0 0 25px rgba(0,255,150,0.6);
}

/* info */
.info{
 position:absolute;
 inset:0;
 background:rgba(0,0,0,0.6);
 color:white;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 opacity:0;
 transition:0.3s;
 border-radius:10px;
 text-align:center;
 padding:10px;
}
.card:hover .info{
 opacity:1;
}

/* ===== MOBILE TAP ===== */
.card.active .info{
 opacity:1;
}

/* ===== DETAIL ===== */
#detail{
 min-height:100vh;
 position:relative;
 display:flex;
 align-items:center;
 justify-content:center;
}

#detail::before{
 content:"";
 position:absolute;
 inset:0;
 background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
 filter:brightness(0.7);
}

.detail-box{
 position:relative;
 background:rgba(255,255,255,0.9);
 padding:30px;
 border-radius:12px;
 text-align:center;
 max-width:400px;
}

/* ===== PARTICLE ===== */
canvas{
 position:fixed;
 top:0;
 left:0;
 pointer-events:none;
}
</style>
</head>

<body>

<canvas id="particle"></canvas>

<header>
 <h1>Hành Trình Xưng Bá Của Ta</h1>
</header>

<nav>
 <a onclick="goPage('home')">Trang chủ</a>
 <a onclick="goPage('origin')">Sơ nguyên</a>
 <a onclick="goPage('members')">Thành viên</a>
</nav>

<!-- HOME -->
<div id="home" class="page active">
 <div class="home-box" id="homeText"></div>
</div>

<!-- ORIGIN -->
<div id="origin" class="page">
 <div class="origin-box">
 Mười năm trước may mắn đã gặp các vị<br>
 Mười năm sau may mắn được gặp các vị<br>
 Đều là vinh hạnh của ta!
 </div>
</div>

<!-- MEMBERS -->
<div id="members" class="page">
 <div class="members">

  <div class="card" onclick="handleCard(this,1)">
   <img src="images/nv1.jpg" loading="lazy">
   <div class="info">
    <b>Sở Dĩ</b>
    <p>Xưng bá thiên hạ</p>
   </div>
  </div>

  <div class="card" onclick="handleCard(this,2)">
   <img src="images/nv2.jpg" loading="lazy">
   <div class="info">
    <b>Tạ Thừa Cảnh</b>
    <p>Tùy tâm mà sống</p>
   </div>
  </div>

 </div>
</div>

<div id="detail" class="page"></div>

<script>

/* TEXT */
const text=[
"Hồng trần muôn sắc",
"Mây nước đường xa",
"Nay đứng dưới trời cao đất rộng",
"Chỉ mong không thẹn với minh nguyệt trong lòng",
"Ta, từng là một thiếu niên"
]

let box=document.getElementById("homeText")
text.forEach((t,i)=>{
 let p=document.createElement("p")
 p.className="line"
 p.style.animationDelay=i+"s"
 p.innerText=t
 box.appendChild(p)
})

/* NAV FIX SCROLL */
function show(id){
 document.querySelectorAll('.page').forEach(p=>{
   p.classList.remove('active')
   p.style.display='none'
 })

 let el=document.getElementById(id)
 el.style.display='block'

 requestAnimationFrame(()=>{
   el.classList.add('active')
   window.scrollTo(0,0)
 })
}

function goPage(page){
 history.pushState({page:page},"","#"+page)
 show(page)
}

/* MOBILE + CLICK */
function handleCard(el,id){
 if(window.innerWidth<768){
   el.classList.toggle('active')
 }else{
   openDetail(id)
 }
}

/* DETAIL */
function openDetail(id){
 let data={
 1:{name:"Sở Dĩ",img:"images/nv1.jpg"},
 2:{name:"Tạ Thừa Cảnh",img:"images/nv2.jpg"}
 }

 let m=data[id]

 document.getElementById("detail").innerHTML=`
 <div class="detail-box">
  <h2>${m.name}</h2>
  <img src="${m.img}" width="200">
 </div>
 `

 history.pushState({page:"member-"+id},"","#member-"+id)
 show("detail")
}

/* BACK */
window.onpopstate=function(e){
 if(e.state){
   if(e.state.page.startsWith("member-")){
     openDetail(e.state.page.split("-")[1])
   }else{
     show(e.state.page)
   }
 }else show("home")
}

/* IMAGE FADE LOAD */
document.querySelectorAll("img").forEach(img=>{
 img.onload=()=>img.classList.add("loaded")
})

/* PARTICLE MƯỢT */
let c=document.getElementById("particle")
let ctx=c.getContext("2d")

function resize(){
 c.width=window.innerWidth
 c.height=window.innerHeight
}
resize()

let p=[]
for(let i=0;i<50;i++){
 p.push({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  v:Math.random()*0.5+0.2
 })
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height)
 ctx.fillStyle="rgba(100,255,150,0.5)"
 p.forEach(i=>{
  ctx.fillRect(i.x,i.y,2,2)
  i.y-=i.v
  if(i.y<0)i.y=c.height
 })
 requestAnimationFrame(draw)
}
draw()

</script>

</body>
</html>
